<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCP ID Card Generator</title>

  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪪</text></svg>">

  <style>
    a,
    label,
    input,
    button,
    textarea,
    #form-group,
    .hint {
      font-family: Verdana, Arial, sans-serif;
      font-weight: normal;
    }

    button,
    input[type=radio],
    input[type=file],
    input[type=range] {
      cursor: pointer;
    }

    #header {
      display: flex;
      justify-content: space-between;
    }

    #toggle-language {
      width: fit-content;
    }

    #form-group {
      margin: 20px 0;
    }

    #content-wrap {
      display: flex;
      justify-content: space-evenly;
      gap: 5vw;
      padding: 2em;
    }



    .large-area {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      margin: 1em 0;
    }

    .large-area textarea {
      font-size: 1.1em;
      padding: 0.5rem 0.7rem;
    }

    .small-area {
      margin: 0.6em 0;
    }

    .small-area input:not([type=color]) {
      padding: 0.5rem;
    }

    input[type=color] {
      width: 4em;
      height: 4em;
      border: none;
      background: none;
    }

    .upload-area {
      border: 1px solid gray;
      padding: 1em;
      border-radius: 1em;
    }

    .hint {
      color: gray;
    }

    #hint-process {
      text-align: center;
      color: gray;
      margin-bottom: 1em;
    }




    .button-area {
      margin: 2em auto 0;
      width: fit-content;
    }

    .button-area button {
      padding: 0.5em 0.8em;
    }

    #slider-area {
      margin: 1em auto 2em 1em;
      width: fit-content;
    }

    #slider-wrap-2 {
      margin: 2em auto;
      width: fit-content;
    }

    #advanced-area {
      margin: 2em auto;
      display: flex;
      flex-direction: column;
      gap: 1em;
      padding: 0 18px;
      display: none;
      overflow: hidden;
    }

    #collapsible-wrap {
      border-radius: 1em;
      width: 100%;
      border: 1px dashed gray;
    }

    .collapsible {
      background-color: transparent;
      cursor: pointer;
      padding: 0.5em 1em;
      text-align: left;
      border: none;
      outline: none;
      font-size: 1em;
    }

    .collapsible:hover {
      text-decoration: underline;
    }

    .collapsible:after {
      content: '▶';
      float: left;
      margin-right: 0.5em;
    }

    .active:after {
      content: "▼";
      float: left;
    }

    #advanced-area .small-area input[type=color] {
      width: 40px;
      height: 40px;
    }

    input#individual-bar-color {
      width: 1.5em;
      height: 1.5em;
    }

    #hint-width,
    #hint-bug {
      text-align: center;
      font-size: 0.9rem;
      color: gray;
      margin: 1em auto;
      max-width: 350px;
    }

    #preview-wrap {
      padding-left: 5vw;
      border-left: 2px dashed gray;
      display: flex;
      flex-direction: column;
    }

    #shadow-wrap {
      box-shadow: 0 0 calc(var(--v-id-card-width) * 0.025) gray;
      width: min-content;
      height: min-content;
    }

    #preview {
      align-self: center;
    }

    @media only screen and (max-width: 700px) {

      #content-wrap {
        flex-direction: column;
        padding: 1em;
      }

      #preview-wrap {
        border-left: none;
        border-top: 2px dashed gray;
      }

    }
  </style>

  <style>
    /* Lato Black Font */
    @import url('https://fonts.googleapis.com/css2?family=Lato:wght@900&display=swap');

    /* Noto Sans SC/TC/JP 思源黑体（简体中文、繁體中文、日本語） */
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@900&family=Noto+Sans+TC:wght@900&family=Noto+Sans+JP:wght@900&display=swap');

    /* Libre Barcode 39 Font */
    @import url('https://fonts.googleapis.com/css2?family=Libre+Barcode+39&display=swap');

    /* Global Settings */
    :root {
      --v-id-card-width: calc(150px + 15vw);

      --v-id-card-logo: url("data:image/svg+xml,%3Csvg id='Layer_1' xmlns='http://www.w3.org/2000/svg' xmlns:xlink='http://www.w3.org/1999/xlink' x='0px' y='0px' viewBox='0 0 1000 1000' style='enable-background:new 0 0 1000 1000;' xml:space='preserve'%3E%3Cstyle type='text/css'%3E .st0%7Bfill:none;stroke:%23000000;stroke-width:25;stroke-miterlimit:10;%7D .st1%7Bfill:none;stroke:%23000000;stroke-width:50;stroke-miterlimit:10;%7D%3C/style%3E%3Cg%3E%3Cg%3E%3Cpath id='b' d='M483.9,210.7v175.1h-35.8l51.4,99.7l51.4-99.7h-35.8V210.7'/%3E%3Cpath id='b_00000000941905411399518890000010819796052927638431_' d='M757.1,630.9l-151.7-87.3l18.2-31.2l-111.7-5.2l60.8,94 l18.2-31.2l151.7,87.3'/%3E%3Cpath id='b_00000064353359574372273160000016056402681424585617_' d='M256.9,657.4l151.7-87.3l18.2,31.2l60.8-94l-111.7,5.2 l18.2,31.2L242.4,631'/%3E%3C/g%3E%3Cpath class='st0' d='M873.5,556.6c2.6-18.7,4.2-37.4,4.2-57.1c0-160.5-99.7-297.1-240.5-352.2l-13.5-69.6H375.3l-13.5,69.6 c-140.8,55-240.5,192.2-240.5,352.2c0,19.2,1.6,38.4,4.2,57.1L72,603.4l124.2,215.1l67.5-23.4c64.9,51.9,147,82.6,236.4,82.6 s171.4-31.2,236.4-82.6l67.5,23.4l124.2-215.1L873.5,556.6z'/%3E%3Ccircle class='st1' cx='499.5' cy='500' r='227'/%3E%3C/g%3E%3C/svg%3E");
      --v-id-card-custom-logo: var(--v-id-card-logo);
      --v-id-card-bg-color: rgb(255, 255, 255);
      --v-id-card-text-color: rgb(0, 0, 0);
      --v-id-card-secondary-color: rgb(175, 175, 175);
      --v-id-card-level0-color: rgb(230, 230, 230);
      --v-id-card-level1-color: rgb(58, 214, 55);
      --v-id-card-level2-color: rgb(50, 148, 255);
      --v-id-card-level3-color: rgb(255, 200, 38);
      --v-id-card-level4-color: rgb(255, 131, 38);
      --v-id-card-level5-color: rgb(255, 38, 0);

      --v-id-card-gradient-1: linear-gradient(to bottom, rgb(50, 134, 224), 40%, rgb(255, 255, 255));
      --v-id-card-gradient-2: radial-gradient(rgb(255, 255, 255), rgb(226, 224, 233));
      --v-id-card-gradient-3: radial-gradient(ellipse 100% 120% at bottom, rgb(200, 200, 200), rgb(21, 21, 30));
    }

    @media only screen and (max-width: 167px) {
      :root {
        --v-id-card-width: 90vw;
      }
    }

    .id-card-vertical {
      position: relative;
      z-index: 0;
      overflow: hidden;
      margin: var(--v-id-card-margin, 2em auto);
      box-sizing: border-box;
      width: var(--v-id-card-width);
      height: var(--v-id-card-height, auto);
      min-height: calc(var(--v-id-card-width)* 1.414);
      padding: var(--v-id-card-padding, calc(var(--v-id-card-width) * 0.045));
      border-radius: var(--v-id-card-radius, calc(var(--v-id-card-width) * 0.05));

      box-shadow: 0 0 calc(var(--v-id-card-width) * 0.025) gray;
      font-family: 'Lato', "Noto Sans SC", "Noto Sans TC", Tahoma, sans-serif;
      font-size: calc(var(--v-id-card-width) * 0.06);
      line-height: initial;
      background-color: var(--v-id-card-bg-color);
      color: var(--v-id-card-text-color);

      display: grid;
      grid-template-areas: "level level portrait"
        "data . portrait"
        "data . ."
        "data info info";
      grid-template-columns: 25% 1fr 46%;
      grid-template-rows:
        calc(var(--v-id-card-width) * 0.4) calc(var(--v-id-card-width) * 0.1) calc(var(--v-id-card-width) * 0.1) 1fr;
    }

    /* Watermark */

    .id-card-vertical::after {
      content: " ";
      z-index: -1;
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: var(--v-id-card-logo-opacity, 0.08);
      background-image: var(--v-id-card-custom-logo);
      background-repeat: no-repeat;
      background-size: 75% auto;
      background-position: 186% 101%;
      pointer-events: none;
    }

    /* ↖️Top-left part */

    .id-card-vertical .level {
      grid-area: level;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .id-card-vertical .level-bar-container {
      display: flex;
      flex-direction: column;
      gap: calc(var(--v-id-card-width) * 0.013);
      width: calc(var(--v-id-card-width) * 0.39);
      margin-left: calc(var(--v-id-card-padding, calc(var(--v-id-card-width) * 0.045)) * -1);
    }

    .id-card-vertical .level-bar {
      width: 100%;
      height: calc(var(--v-id-card-width) * 0.0267);
      background-color: var(--v-id-card-level0-color);
    }

    .id-card-vertical .level-1 .level-bar:nth-child(1) {
      background-color: var(--v-id-card-level1-color);
    }

    .id-card-vertical .level-2 .level-bar:is(:nth-child(1), :nth-child(2)) {
      background-color: var(--v-id-card-level2-color);
    }

    .id-card-vertical .level-3 .level-bar:is(:nth-child(1), :nth-child(2), :nth-child(3)) {
      background-color: var(--v-id-card-level3-color);
    }

    .id-card-vertical .level-4 .level-bar:is(:nth-child(1), :nth-child(2), :nth-child(3), :nth-child(4)) {
      background-color: var(--v-id-card-level4-color);
    }

    .id-card-vertical .level-5 .level-bar {
      background-color: var(--v-id-card-level5-color);
    }

    .id-card-vertical .level-name {
      font-weight: 900;
      font-size: calc(var(--v-id-card-width) * 0.19);
      position: absolute;
      bottom: 0;
    }

    /* ↙️Bottom-left part */

    .id-card-vertical .data {
      grid-area: data;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-end;
      gap: calc(var(--v-id-card-width)* 0.02);
    }

    .id-card-vertical .barcode-wrap {
      display: flex;
      align-items: flex-end;
      flex-direction: column;
      justify-content: space-between;
      gap: calc(var(--v-id-card-width)* 0.02);
      white-space: nowrap;
      writing-mode: vertical-lr;
      text-align: right;
    }

    .id-card-vertical .barcode {
      font-family: 'Libre Barcode 39', sans-serif;
      font-size: calc(var(--v-id-card-width) * 0.167);
      font-weight: normal;
      /* Barcode cannot display properly on higher font weights */
      margin-left: -0.38em;
      transform: scaleX(1.2);
      overflow: hidden;
    }

    .id-card-vertical .barcode-num {
      font-weight: 900;
      font-size: calc(var(--v-id-card-width) * 0.067);
    }

    .id-card-vertical .issue-exp {
      display: flex;
      flex-direction: column;
      white-space: nowrap;
      font-size: 0;
      /* Remove <br> which takes up space */
    }

    .id-card-vertical span.issue-exp-title {
      font-weight: 900;
      font-size: calc(var(--v-id-card-width) * 0.043);
      color: var(--v-id-card-secondary-color);
    }

    .id-card-vertical span.issue-exp-content {
      font-weight: 900;
      font-size: calc(var(--v-id-card-width) * 0.056);
    }

    /* ↗️Top-right part */

    .id-card-vertical .portrait {
      grid-area: portrait;
      border: solid calc(var(--v-id-card-width) * 0.019) var(--v-id-card-secondary-color);
      aspect-ratio: 3 / 4;
      position: relative;
      margin: calc(var(--v-id-card-width)* 0.01);
    }

    .id-card-vertical .portrait::after {
      content: " ";
      display: block;
      pointer-events: none;
      position: absolute;
      top: calc(var(--v-id-card-width)* -0.03);
      bottom: calc(var(--v-id-card-width)* -0.03);
      left: calc(var(--v-id-card-width)* -0.03);
      right: calc(var(--v-id-card-width)* -0.03);
      border: calc(var(--v-id-card-width)* 0.005) solid var(--v-id-card-secondary-color);
      clip-path: polygon(0% 0%,
          var(--v-id-card-portrait-horizontal-corner-size, 33.3%) 0%,
          var(--v-id-card-portrait-horizontal-corner-size, 33.3%) var(--v-id-card-portrait-vertical-corner-size, 25%),
          calc(100% - var(--v-id-card-portrait-horizontal-corner-size, 33.3%)) var(--v-id-card-portrait-vertical-corner-size, 25%),
          calc(100% - var(--v-id-card-portrait-horizontal-corner-size, 33.3%)) 0%,
          100% 0%,
          100% var(--v-id-card-portrait-vertical-corner-size, 25%),
          calc(100% - var(--v-id-card-portrait-horizontal-corner-size, 33.3%)) var(--v-id-card-portrait-vertical-corner-size, 25%),
          calc(100% - var(--v-id-card-portrait-horizontal-corner-size, 33.3%)) calc(100% - var(--v-id-card-portrait-vertical-corner-size, 25%)),
          100% calc(100% - var(--v-id-card-portrait-vertical-corner-size, 25%)),
          100% 100%,
          calc(100% - var(--v-id-card-portrait-horizontal-corner-size, 33.3%)) 100%,
          calc(100% - var(--v-id-card-portrait-horizontal-corner-size, 33.3%)) calc(100% - var(--v-id-card-portrait-vertical-corner-size, 25%)),
          var(--v-id-card-portrait-horizontal-corner-size, 33.3%) calc(100% - var(--v-id-card-portrait-vertical-corner-size, 25%)),
          var(--v-id-card-portrait-horizontal-corner-size, 33.3%) 100%,
          0% 100%,
          0% calc(100% - var(--v-id-card-portrait-vertical-corner-size, 25%)),
          var(--v-id-card-portrait-horizontal-corner-size, 33.3%) calc(100% - var(--v-id-card-portrait-vertical-corner-size, 25%)),
          var(--v-id-card-portrait-horizontal-corner-size, 33.3%) var(--v-id-card-portrait-vertical-corner-size, 25%),
          0% var(--v-id-card-portrait-vertical-corner-size, 25%),
          0% 0%);
    }

    .id-card-vertical .portrait img {
      height: 100%;
      width: 100%;
      object-fit: cover;
    }

    /* ↘️Bottom-right part */

    .id-card-vertical .info {
      grid-area: info;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      text-align: right;
      gap: calc(var(--v-id-card-width)* 0.022);
      word-break: break-all;
      max-width: calc((var(--v-id-card-width) - var(--v-id-card-padding, calc(var(--v-id-card-width) * 0.045))* 2)* 0.75) !important;

    }

    .id-card-vertical span.info-title {
      font-weight: 900;
      font-size: calc(var(--v-id-card-width) * 0.055);
      color: var(--v-id-card-secondary-color);
    }

    .id-card-vertical span.info-content {
      font-weight: 900;
      font-size: calc(var(--v-id-card-width) * 0.08);
      display: flex;
      flex-direction: row-reverse;
      /* Prevent the text from overflowing rightwards */
    }

    // Render language change.

    function changeLanguage(lang) {

      // Reduce the gap between info fields for Chinese and Japanese to preserve the layout.
      const infoSection = document.querySelector('.id-card-vertical .info');
      if (infoSection) {
        if (lang === 'cn' || lang === 'jp') {
          infoSection.style.gap = 'calc(var(--v-id-card-width)* 0.01)';
        } else {
          infoSection.style.gap = 'calc(var(--v-id-card-width)* 0.022)';
        }
      }

      const groups = ["links", "fields", "labels", "textareas", "options", "buttons", "optgroups"];

      for (const group of groups) {
        if (!translations[lang][group]) continue;
        for (const [key, text] of Object.entries(translations[lang][group])) {
          let element = null;

          // Start to browse through the language data array; try to find elements with exact ids same as the array keys, then replace their contents.
          if (group === "links") {
            console.log(`Group: ${group}, Key: ${key}, Text: ${text}, Element:`, element);
            element = document.getElementById(key);

            // Change href for <a>.
            if (element) element.href = text;
            if (!element) {
              console.warn(`Element not found for group "${group}", key "${key}"`);
            }
          }

          else if (group === "textareas") {
            console.log(`Group: ${group}, Key: ${key}, Text: ${text}, Element:`, element);
            element = document.getElementById(key);

            // Change placeholder text for <input>.
            if (element) element.placeholder = text;
            if (!element) {
              console.warn(`Element not found for group "${group}", key "${key}"`);
            }
          }
          else if (group === "optgroups") {
            console.log(`Group: ${group}, Key: ${key}, Text: ${text}, Element:`, element);
            element = document.getElementById(key);

            // Change label text for <optgroup>.
            if (element) element.label = text;
            if (!element) {
              console.warn(`Element not found for group "${group}", key "${key}"`);
            }
          }
          else {
            console.log(`Group: ${group}, Key: ${key}, Text: ${text}, Element:`, element);
            element = document.getElementById(key);

            // Otherwise, change only text content for <label>, <span>, and possibly <div>.
            if (element) element.textContent = text;
            if (!element) {
              console.warn(`Element not found for group "${group}", key "${key}"`);
            }
          }
        }
      }
    }

  <script id="collapsible-config">
    var coll = document.getElementsByClassName("collapsible");

    for (i = 0; i < coll.length; i++) {
      coll[i].addEventListener("click", function () {
        this.classList.toggle("active");

        if (content.style.display === "block") {
          content.style.display = "none";

  <script id="slider-config">

    // Always-on script

    const widthSlider = document.getElementById('width-slider');
    const widthInput = document.getElementById('width-input');
    const opacitySlider = document.getElementById('opacity-slider');
    const opacityInput = document.getElementById('opacity-input');

    const root = document.documentElement;

    // Keep the slider value always the same as numeric input value.

    widthInput.value = widthSlider.value;
    opacityInput.value = opacitySlider.value;

    // Update CSS variable when the slider is dragged.

    widthSlider.addEventListener('input', function () {
      widthInput.value = this.value;
    });

    opacitySlider.addEventListener('input', function () {
      root.style.setProperty('--v-id-card-logo-opacity', this.value / 100);
      opacityInput.value = this.value;
    });

    // Also update CSS variable either when user inputs or changes a pixel number.

    widthInput.addEventListener('input', function () {
      const value = Math.min(Math.max(this.value, 1), 5000);
      widthSlider.value = value;
    });

    opacityInput.addEventListener('input', function () {
      const value = Math.min(Math.max(this.value, 0), 100);
      root.style.setProperty('--v-id-card-logo-opacity', value / 100);
      opacitySlider.value = value;
    });

    // If user selects any background color, then reset the background gradient option to <None>.
    // Make sure the background color won't be covered by the gradient when the user generates the preview,
    // in case they forgot to set the gradient type to <None>.

    document.getElementById('bg-color').addEventListener('input', function () {
      document.getElementById('input-bg').value = 'none';
    });

    // Update background logo immediately after it's uploaded.

    document.getElementById("input-logo").addEventListener("change", function () {
      const file = this.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function (e) {
          root.style.setProperty('--v-id-card-custom-logo', `url('${e.target.result}')`);
        };
        reader.readAsDataURL(file);
      }
    });

  </script>

      }

      // Construct the personnel level

      const levelChar = document.getElementById("input-level-char").value;
      const levelNum = document.getElementById("input-level-num").value;
      document.getElementById("level-name").textContent = levelChar + "-" + levelNum;
      const levelBars = document.getElementById("level-bars");
      levelBars.className = "level-bar-container level-" + levelNum;

      // Construct the barcode

      const id = document.getElementById("input-id").value;
      document.getElementById("barcode").textContent = "*" + id + "*";
      document.getElementById("barcode-num").textContent = id;

      if (document.getElementById('barcode-crop').checked) {
        document.getElementById("barcode").style.maxHeight = 'calc(var(--v-id-card-width) * 0.71)';
      } else {
        document.getElementById("barcode").style.maxHeight = 'fit-content';
      }

      // Issue & Expiry date

      document.getElementById("issue-date").textContent = document.getElementById("input-issue").value;
      document.getElementById("exp-date").textContent = document.getElementById("input-exp").value;

      // Portrait Background gradient & color

      document.getElementById("portrait").style.backgroundImage = document.getElementById("input-bg").value;
      document.getElementById("portrait").style.backgroundColor = document.getElementById('bg-color').value;

      // Other color settings



      root.style.setProperty('--v-id-card-bg-color', cardBgColor.value);
      root.style.setProperty('--v-id-card-text-color', mainTextColor.value);
      root.style.setProperty('--v-id-card-secondary-color', auxTextColor.value);

      root.style.setProperty('--v-id-card-level0-color', level0Color.value);
      root.style.setProperty('--v-id-card-level1-color', level1Color.value);
      root.style.setProperty('--v-id-card-level2-color', level2Color.value);
      root.style.setProperty('--v-id-card-level3-color', level3Color.value);
      root.style.setProperty('--v-id-card-level4-color', level4Color.value);
      root.style.setProperty('--v-id-card-level5-color', level5Color.value);

      if (document.getElementById('individual-bar-color').checked) {
        document.querySelector('.id-card-vertical .level-bar:nth-child(1)').style.backgroundColor = firstColor.value;
        document.querySelector('.id-card-vertical .level-bar:nth-child(2)').style.backgroundColor = secondColor.value;
        document.querySelector('.id-card-vertical .level-bar:nth-child(3)').style.backgroundColor = thirdColor.value;
        document.querySelector('.id-card-vertical .level-bar:nth-child(4)').style.backgroundColor = fourthColor.value;
        document.querySelector('.id-card-vertical .level-bar:nth-child(5)').style.backgroundColor = fifthColor.value;
      } else {
        document.querySelectorAll('.id-card-vertical .level-bar').forEach(bar => {
          bar.style.backgroundColor = '';
        });
      }

      // Show portrait image

      const file = document.getElementById("input-photo").files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function (e) {
          document.getElementById('portrait-img').src = e.target.result;
        };
        reader.readAsDataURL(file);
      }
    }

  </script>

      // Clear inputs
      document.querySelectorAll('input, textarea, select').forEach(el => {

        if (el.type === 'color') {
          el.value = '#ffffff'; // Set color picker to white
        }

        else if (el.type === 'checkbox') {
          el.checked = false; // Uncheck checkboxes
        }

        else if (el.type === 'radio') {
          return; // DO NOT uncheck the language toggle button
        }

        else if (el.tagName === 'SELECT') {
          el.value = 'none'; // Reset the dropdown menu
        }

        else if (el.type === 'text' || el.tagName === 'TEXTAREA') {
          el.value = ''; // Clear all texts and textareas
        }

        else {
          return;
        }

      });

      // Reset logo opacity slider
      opacitySlider.value = 8;
      opacityInput.value = opacitySlider.value;

      // Reset logo opacity
      root.style.setProperty('--v-id-card-logo-opacity', opacitySlider.value / 100);

      // Reset basic colors
      cardBgColor.value = '#ffffff';
      mainTextColor.value = '#000000';
      auxTextColor.value = '#afafaf';
      level0Color.value = '#e6e6e6';
      level1Color.value = '#3ad637';
      level2Color.value = '#3294ff';
      level3Color.value = '#ffc826';
      level4Color.value = '#ff8326';
      level5Color.value = '#ff2600';
    }
  </script>




  <!-- Capture image from DIV via snapDOM -->

  <script src="snapdom-latest.js"></script>


  <script id="download-png">
    // Download PNG script (per "Export as PNG" button click)

    async function captureAsPng(selector) {

      const el = document.querySelector(selector);
      // If the card failed to load or doesn't exist anyway, exit the function.
      if (!el) return;

      try {
        // Wait for the fonts to load
        await document.fonts.ready;

        const width = widthSlider ? Number(widthSlider.value) : 1000;

        console.log("Output Width: " + width);

        // Generate PNG at the defined width
        const result = await snapdom(el, { width: width, embedFonts: true });
        const img = await result.toPng();

        document.body.appendChild(img);
        await result.download({ format: 'png', filename: 'id-card' });
        document.body.removeChild(img);
      }

      catch (error) {
        console.error("Fail to export PNG.", error);
      }

    }

  </script>
